# Cloudflare Worker Configuration
# This Worker provides edge middleware for API proxy, caching, and rate limiting
# 
# NOTE: The React SPA continues to use Supabase SDK directly.
# This Worker is for proxying OTHER external APIs, not Supabase.

name = "api-urs79-app"
main = "worker/index.ts"
compatibility_date = "2024-01-01"

# Account ID (set via environment or CLI)
# account_id = "your-account-id"

# Environment variables
[vars]
CACHE_TTL = "60"
# BACKEND_API_URL = "https://api.example.com"  # Set in dashboard for production

# KV Namespace for rate limiting (optional)
# Create via: wrangler kv:namespace create "RATE_LIMIT"
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "your-kv-namespace-id"

# Routes (uncomment and configure for production)
# [[routes]]
# pattern = "api.urs79.com/*"
# zone_name = "urs79.com"

# Development settings
[dev]
port = 8787
local_protocol = "http"
